name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    name: Server — Lint, Type-check, Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - run: npm ci
      - run: npx prisma generate
      - run: npx tsc --noEmit
      - run: npm run build

  dashboard:
    name: Dashboard — Lint, Type-check, Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [server, dashboard]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build server image
        run: docker build -t barterpay-server ./server

      - name: Build dashboard image
        run: docker build -t barterpay-dashboard ./dashboard
