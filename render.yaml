# Render.com Blueprint — Deploy with "New > Blueprint"
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── Node.js API Server ──────────────────────────────────
  - type: web
    name: ethical-life-server
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: PLATFORM_DOMAIN
        value: onrender.com
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false

  # ── Dashboard (React SPA — static site) ────────────────
  - type: web
    name: ethical-life-dashboard
    runtime: static
    plan: free
    rootDir: dashboard
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
