<!-- Step 2: Medical History -->
<div class="form-step" data-step="2">
    <h2 class="step-title">Medical history</h2>
    <p class="step-sub">Select any conditions that apply.</p>

    <div class="form-checks conditions-grid">
        <label class="form-check">
            <input type="checkbox" name="conditions" value="diabetes">
            <span class="check-box"></span>
            <span>Diabetes</span>
        </label>
        <label class="form-check">
            <input type="checkbox" name="conditions" value="thyroid_disorder">
            <span class="check-box"></span>
            <span>Thyroid Disorder</span>
        </label>
        <label class="form-check">
            <input type="checkbox" name="conditions" value="hypertension">
            <span class="check-box"></span>
            <span>Hypertension</span>
        </label>
        <label class="form-check">
            <input type="checkbox" name="conditions" value="sleep_apnea">
            <span class="check-box"></span>
            <span>Sleep Apnea</span>
        </label>
        <label class="form-check">
            <input type="checkbox" name="conditions" value="high_cholesterol">
            <span class="check-box"></span>
            <span>High Cholesterol</span>
        </label>
        <label class="form-check">
            <input type="checkbox" name="conditions" value="heart_disease">
            <span class="check-box"></span>
            <span>Heart Disease</span>
        </label>
        <label class="form-check">
            <input type="checkbox" name="conditions" value="anxiety_depression">
            <span class="check-box"></span>
            <span>Anxiety / Depression</span>
        </label>
        <label class="form-check">
            <input type="checkbox" name="conditions" value="pcos">
            <span class="check-box"></span>
            <span>PCOS</span>
        </label>
        <label class="form-check">
            <input type="checkbox" name="conditions" value="none">
            <span class="check-box"></span>
            <span>None</span>
        </label>
        <label class="form-check">
            <input type="checkbox" name="conditions" value="other" id="conditionOther">
            <span class="check-box"></span>
            <span>Other</span>
        </label>
    </div>

    <div class="form-group" id="conditionsOtherGroup" style="display:none;">
        <label for="conditionsOtherText" class="sr-only">Other conditions</label>
        <input type="text" id="conditionsOtherText" name="conditionsOther" placeholder="Specify other conditions">
    </div>
</div>
