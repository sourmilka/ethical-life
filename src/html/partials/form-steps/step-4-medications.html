<!-- Step 4: Medications & Supplements -->
<div class="form-step" data-step="4">
    <h2 class="step-title">Medications &amp; supplements</h2>
    <p class="step-sub">Include dosage and frequency if possible.</p>

    <div class="form-group">
        <label for="medications" class="sr-only">Current medications</label>
        <textarea id="medications" name="medications" rows="4" placeholder="Current medications (optional)"></textarea>
    </div>

    <div class="form-group">
        <label for="supplements" class="sr-only">Supplements</label>
        <textarea id="supplements" name="supplements" rows="4" placeholder="Supplements (optional)"></textarea>
    </div>
</div>
