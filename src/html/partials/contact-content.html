<!-- Contact — Form & Info Section -->
<section class="contact-section">
    <div class="contact-form-wrap">
        <h2>Send Us a Message</h2>
        <p>Fill in the form below and our team will get back to you within 24 hours.</p>
        <form class="contact-form" id="contactForm" novalidate>
            <div class="contact-row">
                <div class="contact-field">
                    <label for="contactFirst">First Name</label>
                    <input type="text" id="contactFirst" name="firstName" placeholder="John" required>
                </div>
                <div class="contact-field">
                    <label for="contactLast">Last Name</label>
                    <input type="text" id="contactLast" name="lastName" placeholder="Doe" required>
                </div>
            </div>
            <div class="contact-field">
                <label for="contactEmail">Email Address</label>
                <input type="email" id="contactEmail" name="email" placeholder="john@example.com" required>
            </div>
            <div class="contact-field">
                <label for="contactSubject">Subject</label>
                <select id="contactSubject" name="subject" required>
                    <option value="" disabled selected>Select a topic</option>
                    <option value="general">General Enquiry</option>
                    <option value="treatment">Treatment Question</option>
                    <option value="order">Order Issue</option>
                    <option value="partnership">Partnership</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="contact-field">
                <label for="contactMessage">Message</label>
                <textarea id="contactMessage" name="message" rows="5" placeholder="How can we help?" required></textarea>
            </div>
            <button type="submit" class="contact-submit">Send Message</button>
        </form>
    </div>

    <aside class="contact-info">
        <div class="contact-info-card">
            <h3>Email</h3>
            <p>hello@ethicallife.co.uk</p>
        </div>
        <div class="contact-info-card">
            <h3>Phone</h3>
            <p>0800 123 4567</p>
        </div>
        <div class="contact-info-card">
            <h3>Hours</h3>
            <p>Mon&ndash;Fri: 9am &ndash; 6pm<br>Sat: 10am &ndash; 2pm</p>
        </div>
        <div class="contact-info-card">
            <h3>Follow Us</h3>
            <div class="contact-socials">
                <a href="#" aria-label="Instagram"><img src="src/assets/images/insta.svg" alt="Instagram"></a>
                <a href="#" aria-label="TikTok"><img src="src/assets/images/tiktok.svg" alt="TikTok"></a>
                <a href="#" aria-label="Facebook"><img src="src/assets/images/facebook.svg" alt="Facebook"></a>
            </div>
        </div>
    </aside>
</section>
